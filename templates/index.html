<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.8;
            padding: 40px 20px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 48px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 32px 0;
        }
        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .upload-box {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #007aff;
        }
        input[type="file"] {
            padding: 8px;
            background: #fafafa;
        }
        .btn {
            display: inline-block;
            padding: 10px 28px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0062cc;
        }
        .flash {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .flash.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .flash.error {
            background: #ffebee;
            color: #c62828;
        }
        .hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 12px;
        }
        footer {
            margin-top: 64px;
            text-align: center;
            color: #ccc;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>小站</h1>
            <p class="subtitle">存点东西的地方</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="upload-box">
            <div class="section-title">上传文件</div>
            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">你的名字</label>
                    <input type="text" id="name" name="name" placeholder="写一下名字" required>
                </div>
                <div class="form-group">
                    <label for="file">选择文件</label>
                    <input type="file" id="file" name="file" required>
                </div>
                <button type="submit" class="btn">上传</button>
            </form>
            <p class="hint">支持 doc / docx / pdf / zip / py / txt / jpg / png · 最大 20MB</p>
        </div>

        <footer>
            <p>随便用 · 文件不会丢</p>
        </footer>
    </div>
</body>
</html>

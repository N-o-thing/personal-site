        <article class="article">
            <h1>你好，世界</h1>
            <div class="article-meta">2026-06-16</div>

            <div class="content">
                <p>折腾了半天，终于把这个小站搭起来了。</p>

                <p>没什么宏大的目标，就是想有个地方能存点东西——写写笔记，贴几张图，放几个文件。</p>

                <h2>这博客能干嘛</h2>
                <ul>
                    <li><strong>写文章</strong> — 直接在 <code>posts/</code> 里新建 HTML 文件</li>
                    <li><strong>放图片</strong> — 丢到 <code>uploads/images/</code>，在 <a href="../gallery.html">图库页</a> 展示</li>
                    <li><strong>存文件</strong> — 放 <code>uploads/files/</code>，供下载</li>
                </ul>

                <p>技术栈就是最朴素的 HTML + CSS，纯静态，放在 GitHub Pages 上，免费又好管。</p>

                <blockquote>
                    写得不多，但写了就不删。
                </blockquote>
            </div>
        </article>

        <footer>
